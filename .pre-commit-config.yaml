repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tests/fixtures/
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: unsloppify
        name: unsloppify
        entry: uv run unsloppify --severity error
        language: system
        files: \.(md|markdown|mdx)$
        exclude: ^(tests/fixtures/|skills/unsloppify/references/|THIRD_PARTY_NOTICES\.md$)
        pass_filenames: true
