version: 2
updates:
  # GitHub Actions: bump pinned action versions across all workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
    groups:
      gha:
        patterns:
          - "*"

  # Python dependencies via uv (reads pyproject.toml + uv.lock).
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    groups:
      python-prod:
        dependency-type: production
      python-dev:
        dependency-type: development
